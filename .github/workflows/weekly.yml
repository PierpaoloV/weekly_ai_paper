name: Weekly AI Pathology Digest

on:
  schedule:
    # Runs every Monday at 08:00 UTC
    - cron: "0 8 * * MON"
  workflow_dispatch:  # allows manual trigger from the Actions tab

jobs:
  run-agent:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run AI Digest Agent
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        run: |
          python agent.py
      - name: Commit updated sent_papers.json
        run: |
          git config --global user.name "AI Digest Bot"
          git config --global user.email "bot@github.com"
          git add sent_papers.json
          git commit -m "Update sent papers list" || echo "No changes to commit"
          git push

